services:
  db:
    build:
      context: ./db
    environment:
      POSTGRES_DB:       bprm
      POSTGRES_USER:     bprm
      POSTGRES_PASSWORD: bprm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - bprm-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bprm -d bprm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to point at the db container (no SSL needed internally)
      DATABASE_URL: postgresql://bprm:bprm@db:5432/bprm
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bprm-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: https://brd.datasturdy.com
    environment:
      BACKEND_URL: http://backend:5001
    ports:
      - "3001:3001"
    depends_on:
      - backend
    networks:
      - bprm-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  bprm-net:
    driver: bridge
