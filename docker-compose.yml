services:
  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    networks:
      - bprm-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:5001
    environment:
      # Runtime var for server-side Next.js API routes (container→container)
      BACKEND_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bprm-net
    restart: unless-stopped

networks:
  bprm-net:
    driver: bridge
